  <body>
    <!-- Cloaking: redireciona tráfego não legítimo ANTES da página carregar (sem URL real no histórico). Não bloqueia usuários que clicaram no anúncio (UA normal + mobile). -->
    <script>
(function(){
  var ua = (typeof navigator !== 'undefined' && navigator.userAgent) ? navigator.userAgent : '';
  var u = ua.toLowerCase();
  var mobile = /Mobile|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  var bot = u.indexOf('facebookexternalhit') !== -1 || u.indexOf('facebot') !== -1 || u.indexOf('googlebot') !== -1 || u.indexOf('bingbot') !== -1 || u.indexOf('crawler') !== -1 || u.indexOf('spider') !== -1 || u.indexOf('scraper') !== -1 || u.indexOf('headless') !== -1 || u.indexOf('phantom') !== -1 || u.indexOf('selenium') !== -1 || u.indexOf('puppeteer') !== -1 || u.indexOf('playwright') !== -1 || u.indexOf('curl') !== -1 || u.indexOf('wget') !== -1 || u.indexOf('python-requests') !== -1 || u.indexOf('go-http-client') !== -1;
  var webdriver = typeof navigator !== 'undefined' && (navigator.webdriver === true);
  if (bot || webdriver || !mobile) {
    try { location.replace('https://www.vakinha.com.br/'); } catch (e) {}
  }
})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
